name: Build Frontend Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/remerle/k8s-practice-frontend

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: echo "tag=$(date -u +'%-y.%-m').${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          provenance: false
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
    outputs:
      version-tag: ${{ steps.version.outputs.tag }}
      digest: ${{ steps.build.outputs.digest }}

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/arm64
          provenance: false
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
    outputs:
      digest: ${{ steps.build.outputs.digest }}

  manifest:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        run: |
          TAG=${{ needs.build-amd64.outputs.version-tag }}

          docker buildx imagetools create -t ${{ env.IMAGE }}:${TAG} -t ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}@${{ needs.build-amd64.outputs.digest }} \
            ${{ env.IMAGE }}@${{ needs.build-arm64.outputs.digest }}
