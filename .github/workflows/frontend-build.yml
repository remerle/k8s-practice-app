name: Build Frontend Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/remerle/k8s-practice-frontend

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: echo "tag=$(date -u +'%-y.%-m').${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.tag }}-amd64
            ${{ env.IMAGE }}:latest-amd64
    outputs:
      version-tag: ${{ steps.version.outputs.tag }}

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: echo "tag=$(date -u +'%-y.%-m').${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.tag }}-arm64
            ${{ env.IMAGE }}:latest-arm64

  manifest:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        run: |
          TAG=${{ needs.build-amd64.outputs.version-tag }}

          docker manifest create ${{ env.IMAGE }}:${TAG} \
            ${{ env.IMAGE }}:${TAG}-amd64 \
            ${{ env.IMAGE }}:${TAG}-arm64
          docker manifest push ${{ env.IMAGE }}:${TAG}

          docker manifest create ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}:latest-amd64 \
            ${{ env.IMAGE }}:latest-arm64
          docker manifest push ${{ env.IMAGE }}:latest
